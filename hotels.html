<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luminara State Hotels - Official Site</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            font-family: 'Times New Roman', serif;
            background-color: #ffffff; color: #1c1c1c;
        }

        header {
            display: flex; align-items: center; justify-content: center;
            padding: 20px; background-color: #fff; position: relative;
            border-bottom: 1px solid #e0e0e0; z-index: 100;
        }

        .menu-btn {
            position: absolute; left: 20px; font-size: 24px;
            cursor: pointer; background: none; border: none; color: #1c1c1c;
        }

        .logo {
            text-transform: uppercase; letter-spacing: 4px;
            font-size: 0.9rem; font-weight: bold;
        }

        /* スライドショーエリア */
        .hero-slider {
            position: relative;
            width: 100%;
            height: 50vh;
            overflow: hidden;
            background-color: #f0f0f0;
        }

        .slide {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            z-index: 1;
        }

        .slide.active { opacity: 1; z-index: 2; }

        /* 検索コンテナ */
        .search-container {
            max-width: 500px; margin: -30px auto 40px;
            background: white; padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative; z-index: 10;
        }

        .search-item { border-bottom: 1px solid #e0e0e0; padding: 15px 0; text-align: left; }
        .search-label {
            font-size: 0.75rem; color: #8a704d; text-transform: uppercase;
            letter-spacing: 1.5px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px;
        }

        .search-input, .date-input {
            width: 100%; border: none; font-size: 1.1rem;
            font-family: 'Times New Roman', serif; outline: none; padding: 5px 0;
            background: transparent;
        }

        .date-row { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #e0e0e0; }
        .date-box { flex: 1; text-align: left; }
        
        /* 実際の日付表示 */
        .date-display { font-size: 1.2rem; margin-top: 5px; color: #333; }

        .search-button {
            background-color: #1c1c1c; color: white; width: 100%; padding: 18px;
            border: none; font-size: 0.9rem; text-transform: uppercase;
            letter-spacing: 2px; cursor: pointer; margin-top: 25px;
        }

        /* サイドメニュー */
        .side-menu {
            height: 100%; width: 0; position: fixed; z-index: 200;
            top: 0; left: 0; background-color: #111;
            overflow-x: hidden; transition: 0.5s; padding-top: 60px;
        }
        .side-menu a {
            padding: 10px 32px; text-decoration: none; font-size: 16px;
            color: #818181; display: block; transition: 0.3s;
        }
        .side-menu a:hover { color: #f1f1f1; }
        .close-btn { position: absolute; top: 10px; right: 25px; font-size: 36px; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <div id="mySideMenu" class="side-menu">
        <span class="close-btn" onclick="closeNav()">&times;</span>
        <a href="index.html">Home</a>
        <a href="luminaranwsa.html">Weather Security Agency</a>
        <a href="laws.html">Laws of Luminara</a>
        <a href="luminaralang.html">Luminarian Language</a>
        <a href="hotels.html">Luminara State Hotels</a>
        <a href="ruceairways.html">Luce Airways</a>
    </div>

    <header>
        <button class="menu-btn" onclick="openNav()">&#9776;</button>
        <div class="logo">Luminara State Hotels</div>
    </header>

    <div class="hero-slider">
        <img src="IMG_8421.png" class="slide active">
        <img src="IMG_8422.png" class="slide">
    </div>

    <div class="search-container">
        <div class="search-item">
            <div class="search-label">📍 デスティネーション</div>
            <input type="text" class="search-input" placeholder="次はどちらへお出かけになりますか？">
        </div>
        
        <div class="date-row">
            <div class="date-box">
                <div class="search-label">🗓 
                    <select id="stayNights" onchange="calculateDates()" style="border:none; background:none; color:inherit; font-family:inherit; cursor:pointer; font-size:0.75rem;">
                        <option value="1">1 泊</option>
                        <option value="2">2 泊</option>
                        <option value="3">3 泊</option>
                        <option value="4">4 泊</option>
                        <option value="5">5 泊</option>
                    </select>
                </div>
                <input type="date" id="checkinDate" class="date-input" onchange="calculateDates()">
            </div>
            <div style="padding: 0 15px; font-size: 1.5rem; color: #ccc;">-</div>
            <div class="date-box">
                <div class="search-label">チェックアウト</div>
                <div id="checkoutDisplay" class="date-display">--月--日(-)</div>
            </div>
        </div>

        <button class="search-button" onclick="alert('空室を確認しています...')">ホテルを検索</button>
    </div>

    <script>
        function openNav() { document.getElementById("mySideMenu").style.width = "300px"; }
        function closeNav() { document.getElementById("mySideMenu").style.width = "0"; }

        // 日付と泊数の連動計算
        function calculateDates() {
            const checkinInput = document.getElementById('checkinDate');
            const checkoutDisplay = document.getElementById('checkoutDisplay');
            const nights = parseInt(document.getElementById('stayNights').value);
            
            if (!checkinInput.value) return;

            const checkinDate = new Date(checkinInput.value);
            const checkoutDate = new Date(checkinInput.value);
            checkoutDate.setDate(checkinDate.getDate() + nights);

            const week = ["日", "月", "火", "水", "木", "金", "土"];
            
            // チェックアウト日の表示を更新
            const m = checkoutDate.getMonth() + 1;
            const d = checkoutDate.getDate();
            const w = week[checkoutDate.getDay()];
            checkoutDisplay.innerText = `${m}月${d}日(${w})`;
        }

        // スライドショー
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        function nextSlide() {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }

        window.onload = function() {
            // 初期値を今日の日付にセット
            const today = new Date().toISOString().split('T')[0];
            const checkinInput = document.getElementById('checkinDate');
            checkinInput.value = today;
            
            calculateDates(); // 初期表示を計算
            
            if(slides.length > 1) setInterval(nextSlide, 5000);
        };
    </script>

</body>
</html>
