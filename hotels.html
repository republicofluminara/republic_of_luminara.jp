<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luminara State Hotels - Official Site</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Times New Roman', serif;
            background-color: #ffffff;
            color: #1c1c1c;
        }

        /* ヘッダー */
        header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-color: #fff;
            position: relative;
            border-bottom: 1px solid #e0e0e0;
        }

        .menu-btn {
            position: absolute;
            left: 20px;
            font-size: 24px;
            cursor: pointer;
            background: none;
            border: none;
            color: #1c1c1c;
        }

        .logo {
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        /* メイン画像 */
        .hero {
            position: relative;
            width: 100%;
            height: 50vh;
            overflow: hidden;
        }

        .hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* リッツ風 検索コンテナ */
        .search-container {
            max-width: 500px;
            margin: -30px auto 40px;
            background: white;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
            z-index: 10;
        }

        .search-item {
            border-bottom: 1px solid #e0e0e0;
            padding: 15px 0;
            text-align: left;
        }

        .search-label {
            font-size: 0.75rem;
            color: #8a704d;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 入力欄のスタイル */
        .search-input {
            width: 100%;
            border: none;
            font-size: 1.1rem;
            font-family: 'Times New Roman', serif;
            outline: none;
            padding: 5px 0;
            color: #333;
            background: transparent;
        }

        .search-input::placeholder {
            color: #999;
            font-style: italic;
        }

        .date-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .date-box {
            flex: 1;
            text-align: left;
        }

        .date-value {
            font-size: 1.2rem;
            margin-top: 5px;
        }

        .search-button {
            background-color: #1c1c1c;
            color: white;
            width: 100%;
            padding: 18px;
            border: none;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 25px;
            transition: 0.3s;
        }

        .search-button:hover {
            background-color: #333;
        }

        /* サイドメニュー */
        .side-menu {
            height: 100%; width: 0; position: fixed; z-index: 100;
            top: 0; left: 0; background-color: #111;
            overflow-x: hidden; transition: 0.5s; padding-top: 60px;
        }
        .side-menu a {
            padding: 15px 32px; text-decoration: none; font-size: 18px;
            color: #818181; display: block; transition: 0.3s;
        }
        .side-menu a:hover { color: #f1f1f1; }
        .close-btn { position: absolute; top: 10px; right: 25px; font-size: 36px; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <div id="mySideMenu" class="side-menu">
        <span class="close-btn" onclick="closeNav()">&times;</span>
        <a href="index.html">Home</a>
        <a href="laws.html">Laws of Luminara</a>
        <a href="#">Luminarian Language</a>
        <a href="hotels.html">Luminara State Hotels</a>
        <a href="#">Luce Airways</a>
    </div>

    <header>
        <button class="menu-btn" onclick="openNav()">&#9776;</button>
        <div class="logo">Luminara State Hotels</div>
    </header>

    <div class="hero">
        <img src="https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?auto=format&fit=crop&w=1200&q=80" alt="Main View">
    </div>

    <div class="search-container">
        <div class="search-item">
            <div class="search-label">📍 デスティネーション</div>
            <input type="text" id="destinationInput" class="search-input" placeholder="次はどちらへお出かけになりますか？">
        </div>
        
        <div class="date-row">
            <div class="date-box">
                <div class="search-label">🗓 
    <select id="stayNights" onchange="updateDates()" style="border:none; background:none; font-family:inherit; font-size:inherit; color:inherit; cursor:pointer;">
        <option value="1">1 泊</option>
        <option value="2">2 泊</option>
        <option value="3">3 泊</option>
        <option value="4">4 泊</option>
        <option value="5">5 泊</option>
    </select>
</div>

        <button class="search-button" onclick="performSearch()">ホテルを検索</button>
    </div>

    <script>
        // サイドメニューの制御
        function openNav() { document.getElementById("mySideMenu").style.width = "300px"; }
        function closeNav() { document.getElementById("mySideMenu").style.width = "0"; }

        // 日付を自動更新する機能
        function updateDates() {
            const today = new Date();
            const tomorrow = new Date();
            tomorrow.setDate(today.getDate() + 1);

            const week = ["日", "月", "火", "水", "木", "金", "土"];

            const todayStr = `${today.getMonth() + 1}月${today.getDate()}日(${week[today.getDay()]})`;
            const tomorrowStr = `${tomorrow.getMonth() + 1}月${tomorrow.getDate()}日(${week[tomorrow.getDay()]})`;

            document.getElementById('todayDate').innerText = todayStr;
            document.getElementById('tomorrowDate').innerText = tomorrowStr;
        }

        // 検索ボタンを押した時の動作
        function performSearch() {
            const destination = document.getElementById('destinationInput').value;
            if (destination) {
                alert(destination + " の空室状況を確認しています...\n（ルミナラ共和国へようこそ！）");
            } else {
                alert("目的地を入力してください。");
            }
        }

        // 読み込み時に日付をセット
        window.onload = updateDates;
    </script>

</body>
</html>
