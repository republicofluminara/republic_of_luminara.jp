<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luce Airways | Premium Luxury Airline</title>
    <style>
        :root {
            --luce-pink: #f8c3cd; 
            --luce-gold: #d4af37;
            --luce-dark: #333;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Hiragino Mincho ProN', 'serif';
            background-color: #fffafb;
            color: var(--luce-dark);
        }

        header {
            display: flex; align-items: center; justify-content: center;
            padding: 15px 20px; background: #fff; border-bottom: 2px solid var(--luce-pink);
            position: sticky; top: 0; z-index: 100;
        }

        .menu-btn {
            position: absolute; left: 20px; font-size: 28px;
            background: none; border: none; color: var(--luce-gold); cursor: pointer;
        }

        .logo {
            font-size: 1.4rem; font-weight: bold; letter-spacing: 3px;
            color: var(--luce-gold); text-transform: uppercase;
        }

        /* --- スライドショーのコア設定 --- */
        .hero-slider {
            position: relative;
            width: 100%;
            height: 45vh; /* スマホで見やすい高さ */
            overflow: hidden;
            background-color: #000; /* 読み込み中の背景 */
        }

        .slide {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover; /* 画像を枠に合わせる */
            opacity: 0; /* 最初は隠す */
            transition: opacity 1.5s ease-in-out; /* ふわっと切り替える */
            z-index: 1;
        }

        .slide.active {
            opacity: 1; /* activeクラスがついた画像だけ表示 */
            z-index: 2;
        }

        /* 画像の上のピンクフィルター（世界観の統一） */
        .hero-slider::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(248, 195, 205, 0.2);
            z-index: 3;
        }

        .hero-text {
            position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-size: 1.8rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            letter-spacing: 2px; text-align: center; z-index: 10;
        }

        /* 検索パネル */
        .search-panel {
            max-width: 500px; margin: -40px auto 40px;
            background: white; padding: 25px;
            box-shadow: 0 15px 35px rgba(248,195,205,0.4);
            border-radius: 8px; border-top: 5px solid var(--luce-gold);
            position: relative; z-index: 20;
        }

        .search-tabs { display: flex; gap: 20px; margin-bottom: 20px; font-weight: bold; color: var(--luce-gold); }
        .form-group { margin-bottom: 15px; }
        .form-label { font-size: 0.8rem; color: #888; margin-bottom: 5px; display: block; }
        .input-field { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem; box-sizing: border-box; }
        .date-row { display: flex; gap: 10px; }
        .date-row > div { flex: 1; }
        .search-btn {
            width: 100%; padding: 18px; margin-top: 10px;
            background: linear-gradient(45deg, var(--luce-gold), #b8860b);
            color: white; border: none; border-radius: 4px; font-size: 1.1rem; font-weight: bold; cursor: pointer;
        }

        /* サイドメニュー */
        .side-menu {
            height: 100%; width: 0; position: fixed; z-index: 200;
            top: 0; left: 0; background-color: #111;
            overflow-x: hidden; transition: 0.5s; padding-top: 60px;
        }
        .side-menu a { padding: 15px 32px; text-decoration: none; font-size: 18px; color: #818181; display: block; }
        .close-btn { position: absolute; top: 10px; right: 25px; font-size: 36px; color: white; cursor: pointer; }

    </style>
</head>
<body>

    <div id="mySideMenu" class="side-menu">
        <span class="close-btn" onclick="closeNav()">&times;</span>
        <a href="index.html">Republic of Luminara</a>
        <a href="hotels.html">Luminara State Hotels</a>
    </div>

    <header>
        <button class="menu-btn" onclick="openNav()">&#9776;</button>
        <div class="logo">Luce Airways</div>
    </header>

    <div class="hero-slider">
        <img src="IMG_8417.jpeg" class="slide active">
        <img src="IMG_8419.jpeg" class="slide">
        <img src="IMG_8437.png" class="slide">
        
        <div class="hero-text">空を、もっと美しく。</div>
    </div>

    <div class="search-panel">
        <div class="search-tabs"><span>✈ 航空券予約</span></div>
        <div class="form-group">
            <label class="form-label">出発地</label>
            <input type="text" class="input-field" placeholder="TOKYO (HND)">
        </div>
        <div class="form-group">
            <label class="form-label">到着地</label>
            <input type="text" class="input-field" placeholder="どちらへお出かけですか？">
        </div>
        <div class="date-row">
            <div class="form-group">
                <label class="form-label">往路出発日</label>
                <input type="date" id="depDate" class="input-field">
            </div>
            <div class="form-group">
                <label class="form-label">復路出発日</label>
                <input type="date" id="retDate" class="input-field">
            </div>
        </div>
        <button class="search-btn" onclick="alert('検索中...')">空席を照会する</button>
    </div>

    <script>
        function openNav() { document.getElementById("mySideMenu").style.width = "300px"; }
        function closeNav() { document.getElementById("mySideMenu").style.width = "0"; }

        // スライドショーの制御
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');

        function nextSlide() {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }

        window.onload = function() {
            // 日付の初期化
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('depDate').value = today;

            // 5秒ごとにスライド
            if(slides.length > 1) {
                setInterval(nextSlide, 2000);
            }
        };
    </script>
</body>
</html>
