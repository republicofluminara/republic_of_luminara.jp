<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luce Airways | Premium Luxury Airline</title>
    <style>
        :root {
            --luce-pink: #f8c3cd; /* 桜色・ピンク */
            --luce-gold: #d4af37; /* ゴールド */
            --luce-dark: #333;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Hiragino Mincho ProN', 'serif';
            background-color: #fffafb;
            color: var(--luce-dark);
        }

        /* ヘッダー */
        header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px 20px;
            background: #fff;
            border-bottom: 2px solid var(--luce-pink);
            position: sticky;
            top: 0; z-index: 100;
        }

        .menu-btn {
            position: absolute; left: 20px;
            font-size: 28px; background: none; border: none;
            color: var(--luce-gold); cursor: pointer;
        }

        .logo {
            font-size: 1.4rem; font-weight: bold; letter-spacing: 3px;
            color: var(--luce-gold); text-transform: uppercase;
        }

        /* メインビジュアル */
        .hero {
            width: 100%; height: 45vh;
            background: linear-gradient(rgba(248,195,205,0.3), rgba(248,195,205,0.3)), 
                        url('https://images.unsplash.com/photo-1542296332-2e4473faf563?auto=format&fit=crop&w=1200&q=80');
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center;
        }

        .hero-text {
            color: white; font-size: 1.8rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            letter-spacing: 2px; text-align: center;
        }

        /* 航空券検索パネル (ANA風) */
        .search-panel {
            max-width: 600px; margin: -50px auto 40px;
            background: white; padding: 25px;
            box-shadow: 0 15px 35px rgba(248,195,205,0.4);
            border-radius: 8px; border-top: 5px solid var(--luce-gold);
        }

        .search-tabs {
            display: flex; gap: 20px; margin-bottom: 20px; border-bottom: 1px solid #eee;
            padding-bottom: 10px; font-weight: bold; color: var(--luce-gold);
        }

        .form-group { margin-bottom: 15px; }
        .form-label { font-size: 0.8rem; color: #888; margin-bottom: 5px; display: block; }
        
        .input-field {
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px;
            font-size: 1rem; box-sizing: border-box; outline: none;
        }

        .date-row { display: flex; gap: 10px; }
        .date-row > div { flex: 1; }

        .search-btn {
            width: 100%; padding: 18px; margin-top: 10px;
            background: linear-gradient(45deg, var(--luce-gold), #b8860b);
            color: white; border: none; border-radius: 4px;
            font-size: 1.1rem; font-weight: bold; cursor: pointer;
            transition: 0.3s;
        }

        /* サイドメニュー (共通) */
        .side-menu {
            height: 100%; width: 0; position: fixed; z-index: 200;
            top: 0; left: 0; background-color: #111;
            overflow-x: hidden; transition: 0.5s; padding-top: 60px;
        }
        .side-menu a {
            padding: 15px 32px; text-decoration: none; font-size: 18px;
            color: #818181; display: block; transition: 0.3s;
        }
        .side-menu a:hover { color: #f1f1f1; }
        .close-btn { position: absolute; top: 10px; right: 25px; font-size: 36px; color: white; cursor: pointer; }

    </style>
</head>
<body>

    <div id="mySideMenu" class="side-menu">
        <span class="close-btn" onclick="closeNav()">&times;</span>
        <a href="index.html">Republic of Luminara</a>
        <a href="#">Luminara National Weather Security Agency</a>
        <a href="laws.html">Laws of Luminara</a>
        <a href="#">Luminarian Language</a>
        <a href="hotels.html">Luminara State Hotels</a>
    </div>

    <header>
        <button class="menu-btn" onclick="openNav()">&#9776;</button>
        <div class="logo">Luce Airways</div>
    </header>
　　<div class="hero-slider">
    <img src="IMG_8419.jpeg" class="slide active" alt="Luce Airways Slide 1">
    <img src="IMG_8418.jpeg" class="slide" alt="Luce Airways Slide 2">
    <img src="ご自身の画像URL3" class="slide" alt="Luce Airways Slide 3">

    <div class="hero-text">空を、もっと美しく。</div>
</div>

 


    <div class="search-panel">
        <div class="search-tabs">
            <span>✈ 航空券予約</span>
        </div>

        <div class="form-group">
            <label class="form-label">出発地</label>
            <input type="text" class="input-field" placeholder="Luminara Central (LUM)">
        </div>

        <div class="form-group">
            <label class="form-label">到着地</label>
            <input type="text" class="input-field" placeholder="どちらへお出かけですか？">
        </div>

        <div class="date-row">
            <div class="form-group">
                <label class="form-label">往路出発日</label>
                <input type="date" id="depDate" class="input-field">
            </div>
            <div class="form-group">
                <label class="form-label">復路出発日</label>
                <input type="date" id="retDate" class="input-field">
            </div>
        </div>

        <button class="search-btn" onclick="searchFlight()">空席を照会する</button>
    </div>

    <script>
        function openNav() { document.getElementById("mySideMenu").style.width = "300px"; }
        function closeNav() { document.getElementById("mySideMenu").style.width = "0"; }

        // 初期値を今日の日付にする設定
        window.onload = function() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('depDate').value = today;
        };

        function searchFlight() {
            alert("Luce Airways プレミアムフライトを検索しています...\n優雅なひとときまで、もうまもなくです。");
        }
    </script>

</body>
</html>
