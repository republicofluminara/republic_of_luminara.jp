<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>組織・制度 | ルミナラ共和国政府ポータル</title>
    <style>
        :root {
            --primary-blue: #003366;
            --accent-blue: #4a90e2;
            --bg-light: #f8f9fa;
        }

        body {
            margin: 0; padding: 0;
            /* フォントを標準の角ゴシックに戻しました */
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg-light);
            color: #333;
        }

        header {
            background: #fff;
            border-bottom: 3px solid var(--primary-blue);
            padding: 10px 15px;
            display: flex;
            align-items: center;
            position: sticky; top: 0; z-index: 100;
        }

        .menu-btn {
            font-size: 24px; background: none; border: none;
            color: var(--primary-blue); cursor: pointer;
            margin-right: 10px;
            padding: 5px;
            flex-shrink: 0;
        }

        .logo-area {
            display: flex;
            align-items: center;
            margin-right: auto;
            overflow: hidden; /* はみ出し防止 */
        }

        .logo-text {
            font-size: 1.2rem; /* 少しだけサイズ調整 */
            font-weight: bold;
            color: var(--primary-blue);
            letter-spacing: 0.05em;
            white-space: nowrap; /* 途中で改行させない */
        }

        /* サイドメニュー */
        .side-menu { height: 100%; width: 0; position: fixed; z-index: 200; top: 0; left: 0; background-color: var(--primary-blue); overflow-x: hidden; transition: 0.4s; padding-top: 60px; }
        .side-menu a { padding: 15px 32px; text-decoration: none; font-size: 18px; color: #fff; display: block; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .close-btn { position: absolute; top: 10px; right: 20px; font-size: 36px; color: white; cursor: pointer; }

        .container { max-width: 800px; margin: 20px auto; padding: 0 20px; background: #fff; min-height: 85vh; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        .breadcrumb { padding: 20px 0; font-size: 0.8rem; color: #666; }
        .breadcrumb a { color: var(--primary-blue); text-decoration: none; }
        h1 { font-size: 1.6rem; color: var(--primary-blue); border-bottom: 4px solid var(--accent-blue); padding-bottom: 10px; margin-bottom: 30px; }
        .link-list { list-style: none; padding: 0; }
        .link-list li { border-bottom: 1px solid #eee; }
        .link-list a { display: flex; align-items: center; padding: 18px 10px; text-decoration: none; color: var(--primary-blue); font-weight: bold; }
        .link-list a::before { content: "▶"; margin-right: 12px; font-size: 0.8rem; color: var(--accent-blue); }
        footer { background: var(--primary-blue); color: #fff; text-align: center; padding: 30px; font-size: 0.8rem; }

        /* スマホ向け調整 */
        @media screen and (max-width: 480px) {
            .logo-text { font-size: 1.05rem; }
        }
    </style>
</head>
<body>
    <div id="mySideMenu" class="side-menu">
        <span class="close-btn" onclick="closeNav()">&times;</span>
        <a href="index.html">政府ホーム</a>
        <a href="laws.html">法令検索(e-LEX)</a>
    </div>
    <header>
        <button class="menu-btn" onclick="openNav()">&#9776;</button>
        <div class="logo-area"><div class="logo-text">ルミナラ共和国政府</div></div>
        <div style="font-size: 0.7rem; color: #666; flex-shrink: 0; margin-left: 5px;">English</div>
    </header>
    <div class="container">
        <nav class="breadcrumb"><a href="index.html">政府ホーム</a> ＞ <a href="#">組織・制度</a> ＞ 所管の法令等</nav>
        <h1>所管の法令等</h1>
        <ul class="link-list">
            <li><a href="laws.html">フォスバロ共和国基本憲章</a></li>
            <li><a href="laws.html">社会的貢献及び間接消費税法</a></li>
            <li><a href="laws.html">グローバル・レジデンス寄託規定</a></li>
        </ul>
    </div>
    <footer>&copy; 2026 Government of the Republic of Luminara.</footer>
    <script>
        function openNav() { document.getElementById("mySideMenu").style.width = "280px"; }
        function closeNav() { document.getElementById("mySideMenu").style.width = "0"; }
    </script>
</body>
</html>
