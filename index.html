<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Republic of Luminara</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica', Arial, sans-serif;
            background-color: #f4f4f4;
        }
        /* バナー（ナビゲーションバー）のデザイン */
        .navbar {
            background-color: #003366; /* 共和国の公式ネイビー */
            padding: 15px 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .nav-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        .nav-item {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            transition: 0.3s;
        }
        .nav-item:hover {
            color: #ffcc00; /* マウスを乗せると金に光る */
        }
        /* メインコンテンツの調整 */
        .content {
            padding: 40px;
            text-align: center;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="#about" class="nav-item">About Republic of Luminara</a>
            <a href="#laws" class="nav-item">Laws of Luminara</a>
            <a href="#language" class="nav-item">Luminarian Language</a>
            <a href="#hotels" class="nav-item">Luminara State Hotels</a>
            <a href="#airways" class="nav-item">Luce Airways</a>
        </div>
    </nav>

    <div class="content">
        <h1>Welcome to the Republic of Luminara</h1>
        <p>Official Website of the Phospharo Republic</p>
        <hr>
        <p>憲法上の国名：フォスバロ共和国</p>
        <p>通称：ルミナラ共和国へようこそ！</p>
    </div>

</body>
</html>
