<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Republic of Luminara</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Times New Roman', serif; /* 高級感のあるセリフ体 */
            background-color: #ffffff;
        }

        /* ヘッダー設定 */
        header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            border-bottom: 1px solid #eee;
        }

        /* 三本線メニューボタン */
        .menu-btn {
            position: absolute;
            left: 1px;
            font-size: 24px;
            cursor: pointer;
            background: none;
            border: none;
        }

        /* ロゴ部分 */
        .logo {
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        /* メイン画像エリア */
        .hero {
            position: relative;
            width: 100%;
            height: 70vh; /* 画面の7割の高さ */
            overflow: hidden;
        }

        .hero img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 画像を枠いっぱいに綺麗に収める */
        }

        /* 画像の上の文字 */
        .hero-text {
            position: absolute;
            bottom: 40px;
            left: 20px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* サイドメニュー（隠れている部分） */
        .side-menu {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 100;
            top: 0;
            left: 0;
            background-color: #111;
            overflow-x: hidden;
            transition: 0.5s;
            padding-top: 60px;
        }

        .side-menu a {
            padding: 15px 32px;
            text-decoration: none;
            font-size: 18px;
            color: #818181;
            display: block;
            transition: 0.3s;
        }

        .side-menu a:hover {
            color: #f1f1f1;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 25px;
            font-size: 36px;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="mySideMenu" class="side-menu">
        <span class="close-btn" onclick="closeNav()">&times;</span>
        <a href="governmentpolicy.html">government policy</a>
        <a href="luminaranwsa.html">Luminara National Weather Security Agency</a>
        <a href="laws.html">Laws of Luminara</a>
        <a href="luminaralang.html">Luminarian Language</a>
        <a href="university.html">Phosbalo University</a>
        <a href="hotels.html">Luminara State Hotels</a>
        <a href="luceairways.html">Luce Airways</a>
    </div>

    <header>
        <button class="menu-btn" onclick="openNav()">&#9776;</button>
        <div class="logo">Republic of Luminara</div>
    </header>

    <div class="hero">
        <img src="IMG_8400.jpeg" alt="Luminara Cityscape">
        <div class="hero-text">
            <h1>Phospharo Republic</h1>
            <p>The dawn of a new era.</p>
        </div>
    </div>

    <script>
        function openNav() {
            document.getElementById("mySideMenu").style.width = "300px";
        }

        function closeNav() {
            document.getElementById("mySideMenu").style.width = "0";
        }
    </script>

</body>
</html>
