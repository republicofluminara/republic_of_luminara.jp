<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数値予報・制御開発センター | ルミナラ共和国</title>
    <style>
        :root {
            --primary-blue: #003366;
            --secondary-blue: #0055aa;
            --accent-cyan: #00acc1;
            --light-gray: #f4f7f9;
            --overlay: rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            margin: 0;
            overflow-x: hidden;
        }

        /* ヘッダー */
        header {
            border-bottom: 3px solid var(--primary-blue);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            background: #fff;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .menu-trigger {
            font-size: 1.8rem;
            cursor: pointer;
            color: var(--primary-blue);
            margin-right: 15px;
            padding: 5px;
            user-select: none;
        }

        .logo-area {
            display: flex;
            align-items: center;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--primary-blue);
            border-radius: 50%;
            margin-right: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.6rem;
        }

        /* サイドメニュー（ドロワー） */
        .side-menu {
            position: fixed;
            top: 0;
            left: -280px; /* 最初は隠しておく */
            width: 280px;
            height: 100%;
            background: var(--primary-blue);
            color: white;
            transition: 0.3s;
            z-index: 200;
            padding-top: 60px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.3);
        }

        .side-menu.active {
            left: 0; /* 表示 */
        }

        .side-menu a {
            display: block;
            padding: 15px 25px;
            color: white;
            text-decoration: none;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 0.95rem;
        }

        .side-menu a:hover {
            background: var(--secondary-blue);
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 2rem;
            cursor: pointer;
        }

        /* 背景オーバーレイ */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--overlay);
            display: none;
            z-index: 150;
        }

        .overlay.active {
            display: block;
        }

        /* メインコンテンツ（前回同様） */
        main { max-width: 900px; margin: 20px auto; padding: 0 20px; }
        h1 { border-bottom: 2px solid #ddd; padding-bottom: 10px; }
        .diagram-container { background: #ebf3f9; padding: 20px; border: 1px solid #c2d1e0; margin: 20px 0; }
        .system-chart { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .box { background: white; border: 2px solid var(--secondary-blue); padding: 15px; width: 90%; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; width: 100%; }
        .sub-box { border: 1px solid var(--accent-cyan); padding: 10px; background: white; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="overlay" id="overlay"></div>

<nav class="side-menu" id="sideMenu">
    <div class="close-btn" id="closeBtn">&times;</div>
    <a href="#">Luminara National Weather Security Agency</a>
    <a href="#">Laws of Luminara</a>
    <a href="#">Luminarian Language</a>
    <a href="#">Luminara State Hotels</a>
    <a href="#">Luce Airways</a>
</nav>

<header>
    <div class="menu-trigger" id="menuTrigger">☰</div>
    <div class="logo-area">
        <div class="logo-icon">LMDA</div>
        <div>ルミナラ共和国 気象防衛局</div>
    </div>
</header>

<main>
    <h1>数値予報・制御開発センター</h1>
    <p>台風抑制システム（TMS）および戦略的降雨管理（SRM）の統合運用プラットフォームです。</p>

    <div class="diagram-container">
        <div class="system-chart">
            <div class="box">
                <strong style="color: var(--secondary-blue);">気象制御総括課</strong>
                <p style="font-size: 0.8rem; margin: 5px 0;">核融合エネルギー配分および国際調整</p>
            </div>
            <div style="font-size: 20px;">⬇</div>
            <div class="grid-3">
                <div class="sub-box"><strong>台風抑制 (TMS)</strong><br>海洋冷却・蒸発抑制</div>
                <div class="sub-box"><strong>戦略的降雨 (SRM)</strong><br>レーザー加熱・水蒸気誘導</div>
                <div class="sub-box"><strong>人工海管理</strong><br>水資源貯留・発電連携</div>
            </div>
        </div>
    </div>
</main>

<script>
    const menuTrigger = document.getElementById('menuTrigger');
    const sideMenu = document.getElementById('sideMenu');
    const closeBtn = document.getElementById('closeBtn');
    const overlay = document.getElementById('overlay');

    // メニューを開く
    menuTrigger.addEventListener('click', () => {
        sideMenu.classList.add('active');
        overlay.classList.add('active');
    });

    // メニューを閉じる
    const closeMenu = () => {
        sideMenu.classList.remove('active');
        overlay.classList.remove('active');
    };

    closeBtn.addEventListener('click', closeMenu);
    overlay.addEventListener('click', closeMenu);
</script>

</body>
</html>
