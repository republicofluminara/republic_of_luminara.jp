<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>法令検索 - フォスバロ共和国 (GOV.LUMINARA)</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: #ffffff;
            color: #333;
        }

        /* ヘッダー：e-GOV風 */
        header {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            background-color: #fff;
            border-bottom: 1px solid #ddd;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .menu-btn {
            font-size: 24px;
            background: none;
            border: none;
            color: #003366;
            cursor: pointer;
            margin-right: 15px;
        }

        .gov-logo {
            display: flex;
            align-items: center;
            font-weight: bold;
            color: #003366;
            font-size: 1.2rem;
        }

        .gov-logo span {
            color: #4a90e2;
            margin: 0 5px;
        }

        /* メインコンテンツ */
        .main-content {
            padding: 15px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* 検索セクションの装飾 */
        .search-panel {
            background-color: #fff;
            margin-bottom: 20px;
        }

        .status-select {
            font-size: 0.9rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* ラジオボタンエリア */
        .radio-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            font-size: 0.95rem;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* 法令種別（薄いグレーのボックス） */
        .category-box {
            background-color: #f2f5f8;
            border: 1px solid #e0e0e0;
            padding: 12px;
            font-size: 0.85rem;
            margin-bottom: 15px;
            position: relative;
        }

        .category-title {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .checkbox-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .checkbox-grid label {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        /* 検索バー */
        .search-bar {
            display: flex;
            height: 44px;
            margin-bottom: 25px;
        }

        .search-bar input {
            flex: 1;
            border: 1px solid #ccc;
            padding: 0 10px;
            font-size: 1rem;
            outline: none;
        }

        .search-bar button {
            background-color: #0000cd;
            color: white;
            border: none;
            width: 50px;
            cursor: pointer;
            font-size: 1.2rem;
        }

        /* お知らせ・条文エリア */
        .info-box {
            background-color: #eff5ff;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .info-date {
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
        }

        /* サイドメニュー（共通） */
        .side-menu {
            height: 100%; width: 0; position: fixed; z-index: 200;
            top: 0; left: 0; background-color: #111;
            overflow-x: hidden; transition: 0.5s; padding-top: 60px;
        }
        .side-menu a {
            padding: 15px 32px; text-decoration: none; font-size: 18px;
            color: #818181; display: block; transition: 0.3s;
        }
        .side-menu a:hover { color: #f1f1f1; }
        .close-btn { position: absolute; top: 10px; right: 25px; font-size: 36px; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <div id="mySideMenu" class="side-menu">
        <span class="close-btn" onclick="closeNav()">&times;</span>
        <a href="index.html">Republic of Luminara</a>
        <a href="luminaranwsa.html">Luminara National Whether Security Agency</a>
        <a href="luminaralang.html">Luminarian Language</a>
        <a href="hotels.html">Luminara State Hotels</a>
        <a href="luceairways.html">Luce Airways</a>
    </div>

    <header>
        <button class="menu-btn" onclick="openNav()">&#9776;</button>
        <div class="gov-logo">e<span>-</span>GOV 法令検索</div>
    </header>

    <div class="main-content">
        <div class="search-panel">
            <div class="status-select">現行法令 ∨</div>

            <div class="radio-group">
                <label><input type="radio" name="stype" checked> 法令名</label>
                <label><input type="radio" name="stype"> キーワード</label>
                <label><input type="radio" name="stype"> 法令番号</label>
            </div>

            <div class="category-box">
                <div class="category-title">法令種別</div>
                <div class="checkbox-grid">
                    <label><input type="checkbox" checked> 法律</label>
                    <label>( <input type="radio" name="l-sub" checked> すべて )</label>
                    <label><input type="checkbox" checked> 政令</label>
                    <label><input type="checkbox" checked> 勅令</label>
                    <label><input type="checkbox" checked> 府省令</label>
                    <label><input type="checkbox" checked> 規則</label>
                </div>
            </div>

            <div class="search-bar">
                <input type="text" id="lawSearch" placeholder="検索法令名を入力してください。">
                <button onclick="searchAction()">🔍</button>
            </div>
        </div>

        <div class="info-box">
            <span class="info-date">2026-03-04 法令データ更新のお知らせ</span>
            <p>フォスバロ共和国憲法に基づき、最新の法令データが反映されました。デジタル領土内での全活動に適用されます。</p>
        </div>

        <h3 style="border-left: 5px solid #003366; padding-left: 10px; margin-top: 30px;">主要法令</h3>
        <p>・フォスバロ共和国憲法（通称：ルミナラ共和国憲法）</p>
        <p>・デジタル居住権法</p>
    </div>

    <script>
        function openNav() { document.getElementById("mySideMenu").style.width = "250px"; }
        function closeNav() { document.getElementById("mySideMenu").style.width = "0"; }
        
        function searchAction() {
            const val = document.getElementById('lawSearch').value;
            if(val) {
                alert("「" + val + "」に該当する法令を検索しています...");
            } else {
                alert("検索キーワードを入力してください。");
            }
        }
    </script>
</body>
</html>
