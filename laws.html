<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-LEX 法令検索 | ルミナラ共和国</title>
    <style>
        :root { --navy: #002B5B; --aqua: #00A8CC; --bg: #F4F7F9; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: #333; }
        
        header {
            background: #fff; border-bottom: 3px solid var(--navy);
            padding: 12px 20px; display: flex; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }
        .menu-btn { font-size: 24px; background: none; border: none; color: var(--navy); cursor: pointer; margin-right: 15px; }
        .logo-text { font-size: 1.15rem; font-weight: 800; color: var(--navy); white-space: nowrap; }

        .side-menu { height: 100%; width: 0; position: fixed; z-index: 200; top: 0; left: 0; background: var(--navy); overflow-x: hidden; transition: 0.4s; padding-top: 60px; }
        .side-menu a { padding: 18px 30px; text-decoration: none; color: #fff; display: block; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .close-btn { position: absolute; top: 15px; right: 25px; font-size: 36px; color: white; cursor: pointer; }

        .container { max-width: 900px; margin: 20px auto; padding: 30px; background: #fff; min-height: 85vh; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        
        h1 { font-size: 1.8rem; color: var(--navy); border-bottom: 2px solid var(--aqua); padding-bottom: 10px; margin-bottom: 30px; }

        /* 検索ボックス */
        .search-area { background: #f8fafc; border: 1px solid #e2e8f0; padding: 25px; border-radius: 8px; margin-bottom: 30px; }
        .search-flex { display: flex; gap: 10px; }
        .search-flex input { flex: 1; padding: 12px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 1rem; }
        .search-flex button { background: var(--navy); color: white; border: none; padding: 0 25px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        /* 法令カード表示 */
        .law-card { margin-bottom: 30px; padding: 25px; border: 1px solid #edf2f7; border-left: 6px solid var(--navy); }
        .law-title { font-size: 1.2rem; font-weight: bold; color: var(--navy); margin-bottom: 12px; }
        .law-content { font-size: 0.95rem; line-height: 1.8; color: #444; white-space: pre-wrap; }
        .highlight { background: #ffeb3b; font-weight: bold; padding: 0 2px; }
        
        #results-info { margin-bottom: 15px; font-weight: bold; color: var(--aqua); }
        footer { text-align: center; padding: 40px; font-size: 0.8rem; color: #94a3b8; }
    </style>
</head>
<body>
    <div id="mySideMenu" class="side-menu">
        <span class="close-btn" onclick="closeNav()">&times;</span>
        <a href="index.html">政府ホーム</a>
        <a href="laws.html">e-LEX 法令検索</a>
    </div>

    <header>
        <button class="menu-btn" onclick="openNav()">&#9776;</button>
        <div class="logo-text">e-LEX ルミナラ共和国法令検索</div>
    </header>

    <div class="container">
        <h1>法令検索システム</h1>
        
        <div class="search-area">
            <div style="margin-bottom:10px; font-weight:bold; color:var(--navy);">キーワードを入力してください</div>
            <div class="search-flex">
                <input type="text" id="searchInput" placeholder="例：消費税、寄託、MPS、ダイヤモンド葬">
                <button onclick="executeSearch()">検索</button>
            </div>
        </div>

        <div id="results-area">
            <div id="results-info">すべての主要法令を表示中</div>
            <div id="law-list"></div>
        </div>
    </div>

    <footer>&copy; 2026 e-LEX Project by Luminara Govt.</footer>

    <script>
        // これまで決めた全ての法令データベース
        const db = [
            { 
                title: "フォスバロ共和国基本憲章", 
                content: "第1条（国家の定義）：本国は全存在の尊厳と、相互奉仕による美学を統治の基軸とする。\n第2条（意志決定）：最高倫理AIの提言に基づき、有権者の7割の合意形成を要する直接民主制を運用する。" 
            },
            { 
                title: "社会的貢献及び間接消費税に関する特例法", 
                content: "第1条（税制の目的）：個人の生産活動への介入（所得課税）を撤廃し、国内資産の循環を最適化する。\n第2条（賦課）：国内における全ての最終消費行為に対し、社会資本維持費として一律30%の賦課を行う。" 
            },
            { 
                title: "国防対策班(MPS) 設置及び権限規則", 
                content: "第1条（組織）：市民の私的聖域と国家的秩序を保護するため、執行機関「MPS」を設置する。\n第2条（権限）：MPSは自律型航空機を含む多層監視網を運用し、秩序攪乱事象に対し即時介入の権限を有する。" 
            },
            { 
                title: "グローバル・レジデンス寄託（GRP）規定", 
                content: "第1条（定住資格）：当国への定住を希望する者は、国家安定基金へ100万ウォラル（1.9億円相当）を預託しなければならない。\n第2条：当該寄託金は5年間の凍結期間を経て、返還資格が生じる。" 
            },
            { 
                title: "都市美学的資源循環(SRM) 管理令", 
                content: "第1条（目的）：分子レベルでの資源循環により廃棄物をゼロとし、景観美を永久に保全する。\n第2条（義務）：全市民および事業者は、認可されたSRMハブへの資源返還が義務付けられる。" 
            },
            { 
                title: "生命の承継（ダイヤモンド葬）ガイドライン", 
                content: "第1条：個人の生命の記憶を炭素結晶として固定し、有形的価値として次世代へ承継することを推奨する。\n第2条：国営の結晶化施設における儀礼は、最高格式の国葬に準じるものとする。" }
        ];

        function openNav() { document.getElementById("mySideMenu").style.width = "300px"; }
        function closeNav() { document.getElementById("mySideMenu").style.width = "0"; }

        function displayLaws(laws, keyword = "") {
            const list = document.getElementById('law-list');
            list.innerHTML = "";
            laws.forEach(law => {
                let content = law.content;
                if(keyword) {
                    const reg = new RegExp(keyword, 'gi');
                    content = content.replace(reg, `<span class="highlight">${keyword}</span>`);
                }
                list.innerHTML += `<div class="law-card"><div class="law-title">${law.title}</div><div class="law-content">${content}</div></div>`;
            });
        }

        function executeSearch() {
            const keyword = document.getElementById('searchInput').value.trim();
            const info = document.getElementById('results-info');
            if(!keyword) {
                info.innerText = "すべての主要法令を表示中";
                displayLaws(db);
                return;
            }
            const filtered = db.filter(l => l.title.includes(keyword) || l.content.includes(keyword));
            info.innerText = `「${keyword}」の検索結果： ${filtered.length} 件`;
            displayLaws(filtered, keyword);
        }

        // 初期表示
        displayLaws(db);
    </script>
</body>
</html>
