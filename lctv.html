<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LCTV | Luminara Central Television</title>
    <link rel="stylesheet" href="style4.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="sideMenu" class="side-menu-overlay">
        <div class="side-menu-content">
            <button class="close-btn" onclick="toggleMenu()">×</button>
            <h2 class="menu-title">Republic of Luminara</h2>
            <nav class="side-nav-list">
                <ul>
                    <li><a href="index.html" style="color: inherit; text-decoration: none;">index.html</a></li>
                    <li>政府広報</li>
                    <li>フォスバロ国立アーカイブ</li>
                    <li>ルミナラ文化遺産</li>
                    <li>緊急放送設定</li>
                    <li>お問い合わせ</li>
                </ul>
            </nav>
        </div>
    </div>

    <header>
        <div class="header-main">
            <div class="header-left">
                <button class="hamburger-menu" onclick="toggleMenu()" aria-label="メニュー">
                    <span></span><span></span><span></span>
                </button>
                <div class="logo-box">
                    <img src="IMG_8499.jpeg" alt="LCTV Logo" class="lctv-logo-img">
                </div>
            </div>

            <div class="search-container">
                <input type="text" id="searchInput" placeholder="番組・ニュースを検索">
                <button class="search-btn">🔍</button>
            </div>
        </div>

        <nav class="sub-nav">
            <ul id="mainNav">
                <li onclick="navigateTo('news')">ニュース</li>
                <li class="active" onclick="navigateTo('guide')">番組表</li>
                <li onclick="navigateTo('archive')">アーカイブ</li>
                <li onclick="navigateTo('live')">ライブ配信</li>
                <li onclick="navigateTo('ranking')">ランキング</li>
            </ul>
        </nav>
    </header>

    <main id="mainContent">
        <div id="guideSection">
            <section class="date-bar">
                <div class="date-list" id="dateList"></div>
                <div class="calendar-wrapper">
                    <label for="datePicker" class="calendar-trigger">📅</label>
                    <input type="date" id="datePicker" onchange="selectCustomDate(this.value)">
                </div>
            </section>

            <div class="time-filter">
                <button class="filter-btn" id="filter-now" onclick="setTimeFilter('now')">現在</button>
                <button class="filter-btn active" id="filter-am" onclick="setTimeFilter('am')">午前</button>
                <button class="filter-btn" id="filter-pm" onclick="setTimeFilter('pm')">午後</button>
            </div>

            <section class="channel-tabs" id="channelTabs">
                <button class="ch-item active" onclick="switchChannel(1, '総合')"><strong>LCTV 1</strong><span>総合</span></button>
                <button class="ch-item" onclick="switchChannel(2, 'スポーツ')"><strong>LCTV 2</strong><span>スポーツ</span></button>
                <button class="ch-item" onclick="switchChannel(3, '国際放送')"><strong>LCTV 3</strong><span>国際放送</span></button>
                <button class="ch-item" onclick="switchChannel(4, 'バラエティ')"><strong>LCTV 4</strong><span>バラエティ</span></button>
                <button class="ch-item" onclick="switchChannel(5, 'ドラマ')"><strong>LCTV 5</strong><span>ドラマ</span></button>
                <button class="ch-item" onclick="switchChannel(6, '映画')"><strong>LCTV 6</strong><span>映画</span></button>
                <button class="ch-item" onclick="switchChannel(7, '教育')"><strong>LCTV 7</strong><span>教育</span></button>
                <button class="ch-item" onclick="switchChannel(8, '子供')"><strong>LCTV 8</strong><span>子供</span></button>
                <button class="ch-item" onclick="switchChannel(9, '音楽')"><strong>LCTV 9</strong><span>音楽</span></button>
            </section>

            <section class="program-container">
                <div class="time-header" id="listHeader">● 番組表を表示中</div>
                <div id="programList"></div>
            </section>
        </div>
    </main>

    <script>
        let currentDayOffset = 0; 
        let currentChannel = 1;
        let currentGenre = "総合";
        let currentTimeFilter = 'am';

        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('open');
        }

        const programData = {
            1: { am: ["ルミナラ・ニュースモーニング", "おはようフォスバロ"], pm: ["お昼の総合ワイド", "LCTVプレミアムドラマ"], now: ["LIVE: 総合ニュース"] },
            2: { am: ["朝のストレッチ", "世界スポーツアーカイブ"], pm: ["ルミナラ・リーグ中継", "テニス特番"], now: ["LIVE: サッカー中継"] },
            default: { am: ["特別番組", "セレクション"], pm: ["名作アーカイブ", "アンコール放送"], now: ["放送中"] }
        };

        function initDateBar() {
            const dateList = document.getElementById('dateList');
            dateList.innerHTML = '';
            const dayNames = ['日', '月', '火', '水', '木', '金', '土'];
            for (let i = -1; i <= 1; i++) {
                const d = new Date();
                d.setDate(d.getDate() + i);
                const monthDay = `${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                const dateItem = document.createElement('div');
                dateItem.className = `date-item ${i === currentDayOffset ? 'active' : ''}`;
                dateItem.onclick = () => { currentDayOffset = i; initDateBar(); updateProgramList(); };
                dateItem.innerHTML = `<span class="d-label">${dayNames[d.getDay()]}曜日</span><span class="d-value">${monthDay}</span>`;
                dateList.appendChild(dateItem);
            }
        }

        function setTimeFilter(filter) {
            currentTimeFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`filter-${filter}`).classList.add('active');
            updateProgramList();
        }

        function switchChannel(num, genre) {
            currentChannel = num;
            currentGenre = genre;
            document.querySelectorAll('.ch-item').forEach(el => el.classList.remove('active'));
            if(event) event.currentTarget.classList.add('active');
            updateProgramList();
        }

        function updateProgramList() {
            const list = document.getElementById('programList');
            const data = programData[currentChannel] || programData.default;
            const programs = data[currentTimeFilter] || ["放送予定はありません"];
            document.getElementById('listHeader').innerText = `● LCTV ${currentChannel} [${currentGenre}]`;
            list.innerHTML = programs.map((p, i) => `
                <div class="program-card">
                    <div class="p-time">${i === 0 ? "08:00" : "10:30"}</div>
                    <div class="p-detail"><h4>${p}</h4><p>LCTV Official Content</p></div>
                    <button class="p-play">視聴</button>
                </div>`).join('');
        }

        function selectCustomDate(val) { updateProgramList(); }
        function navigateTo(dest) { console.log("Nav: " + dest); }

        window.onload = () => { initDateBar(); updateProgramList(); };
    </script>
</body>
</html>
