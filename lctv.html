<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LCTV | Luminara Central Television</title>
    <link rel="stylesheet" href="style4.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="sideMenu" class="side-menu-overlay">
        <div class="side-menu-content">
            <button class="close-btn" onclick="toggleMenu()">×</button>
            <h2 class="menu-title">Republic of Luminara</h2>
            <nav class="side-nav-list">
                <ul>
                    <li onclick="index.html">政府広報 (ニュース)</li>
                    <li onclick="navigateTo('guide'); toggleMenu();">LCTV 番組表</li>
                    <li onclick="navigateTo('archive'); toggleMenu();">フォスバロ国立アーカイブ</li>
                    <li onclick="navigateTo('live'); toggleMenu();">ライブ配信チャンネル</li>
                    <li onclick="alert('緊急放送システム：正常稼働中'); toggleMenu();">緊急放送設定</li>
                </ul>
            </nav>
        </div>
    </div>

    <header>
        <div class="header-main">
            <div class="header-left">
                <button class="hamburger-menu" onclick="toggleMenu()" aria-label="メニュー">
                    <span></span><span></span><span></span>
                </button>
                <div class="logo-box">
                    <img src="IMG_8499.jpeg" alt="LCTV Logo" class="lctv-logo-img">
                </div>
            </div>

            <div class="search-container">
                <input type="text" id="searchInput" placeholder="番組・ニュースを検索">
                <button class="search-btn">🔍</button>
            </div>
        </div>

        <nav class="sub-nav">
            <ul id="mainNav">
                <li id="nav-news" onclick="navigateTo('news')">ニュース</li>
                <li id="nav-guide" class="active" onclick="navigateTo('guide')">番組表</li>
                <li id="nav-archive" onclick="navigateTo('archive')">アーカイブ</li>
                <li id="nav-live" onclick="navigateTo('live')">ライブ配信</li>
                <li id="nav-ranking" onclick="navigateTo('ranking')">ランキング</li>
            </ul>
        </nav>
    </header>

    <main id="mainContent">
        </main>

    <script>
        let currentDayOffset = 0; 
        let currentChannel = 1;
        let currentTimeFilter = 'am';

        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('open');
        }

        // ページごとのコンテンツ
        const pages = {
            guide: `
                <div id="guideSection">
                    <section class="date-bar"><div class="date-list" id="dateList"></div></section>
                    <div class="time-filter">
                        <button class="filter-btn" id="filter-now" onclick="setTimeFilter('now')">現在</button>
                        <button class="filter-btn active" id="filter-am" onclick="setTimeFilter('am')">午前</button>
                        <button class="filter-btn" id="filter-pm" onclick="setTimeFilter('pm')">午後</button>
                    </div>
                    <section class="channel-tabs" id="channelTabs">
                        <button class="ch-item active" onclick="switchChannel(1)"><strong>LCTV 1</strong><span>総合</span></button>
                        <button class="ch-item" onclick="switchChannel(2)"><strong>LCTV 2</strong><span>スポーツ</span></button>
                        <button class="ch-item" onclick="switchChannel(3)"><strong>LCTV 3</strong><span>国際</span></button>
                    </section>
                    <section class="program-container"><div id="programList"></div></section>
                </div>`,
            news: `<div class="content-view"><h3>LCTV ニュース</h3><div class="program-card"><h4>共和国経済特区の拡大計画</h4><p>政府はフォスバロ地区の再開発を決定しました。</p></div></div>`,
            archive: `<div class="content-view"><h3>国立アーカイブ</h3><div class="program-card"><h4>建国50周年式典映像</h4><p>ルミナラ共和国の歩みを振り返る特集番組です。</p></div></div>`,
            live: `<div class="content-view"><h3>ライブ配信</h3><div class="program-card"><h4>LCTV 24/7</h4><p>現在、臨時ニュースを全世界へ配信中です。</p></div></div>`,
            ranking: `<div class="content-view"><h3>ランキング</h3><div class="program-card"><h4>1位: ルミナラ・ドラマ・ナイト</h4><p>今週のトップ視聴率番組です。</p></div></div>`
        };

        function navigateTo(page) {
            document.getElementById('mainContent').innerHTML = pages[page];
            document.querySelectorAll('.sub-nav li').forEach(li => li.classList.remove('active'));
            const activeNav = document.getElementById(`nav-${page}`);
            if(activeNav) activeNav.classList.add('active');

            if(page === 'guide') {
                initDateBar();
                updateProgramList();
            }
        }

        function initDateBar() {
            const dateList = document.getElementById('dateList');
            if(!dateList) return;
            dateList.innerHTML = '';
            const dayNames = ['日', '月', '火', '水', '木', '金', '土'];
            for (let i = -1; i <= 1; i++) {
                const d = new Date();
                d.setDate(d.getDate() + i);
                const monthDay = `${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                const dateItem = document.createElement('div');
                dateItem.className = `date-item ${i === currentDayOffset ? 'active' : ''}`;
                dateItem.onclick = () => { currentDayOffset = i; initDateBar(); updateProgramList(); };
                dateItem.innerHTML = `<span class="d-label">${dayNames[d.getDay()]}曜日</span><span class="d-value">${monthDay}</span>`;
                dateList.appendChild(dateItem);
            }
        }

        function setTimeFilter(filter) {
            currentTimeFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`filter-${filter}`).classList.add('active');
            updateProgramList();
        }

        function switchChannel(num) {
            currentChannel = num;
            document.querySelectorAll('.ch-item').forEach(el => el.classList.remove('active'));
            if(event) event.currentTarget.classList.add('active');
            updateProgramList();
        }

        function updateProgramList() {
            const list = document.getElementById('programList');
            if(!list) return;
            list.innerHTML = `<div class="program-card"><div class="p-time">09:00</div><div class="p-detail"><h4>LCTV ${currentChannel} スペシャルコンテンツ</h4><p>ルミナラ中央放送による公式配信</p></div><button class="p-play">視聴</button></div>`;
        }

        window.onload = () => { navigateTo('guide'); };
    </script>
</body>
</html>
